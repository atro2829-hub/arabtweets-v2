name: adentweet
description: منصة تغريد عربية - AdenTweet
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Supabase
  supabase_flutter: ^2.8.4
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  toastification: ^2.3.0
  flex_color_scheme: ^7.3.1
  responsive_framework: ^1.5.1
  
  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.2
  
  # Utils
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.1
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  http: ^1.2.2
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  
  # Pull to refresh
  pull_to_refresh_flutter3: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/svg/