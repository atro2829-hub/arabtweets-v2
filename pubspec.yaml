name: adentweet
description: منصة تغريد عربية - AdenTweet
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.8.4

  # State Management & Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  toastification: ^2.3.0

  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.2

  # Utils
  shared_preferences: ^2.3.4
  intl: ^0.19.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  pull_to_refresh_flutter3: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/svg/